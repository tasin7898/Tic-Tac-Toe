<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Tic Tac Toe</h1>
  </header>
  <div class="scores">
    <div class="player1">X: </div>
    <div class="draw"></div>
    <div class="player2">O: </div>
  </div>
  <div class="game-board">
    <div id="p0"></div>
    <div id="p1"></div>
    <div id="p2"></div>
    <div id="p3"></div>
    <div id="p4"></div>
    <div id="p5"></div>
    <div id="p6"></div>
    <div id="p7"></div>
    <div id="p8"></div>
  </div>

  <div class="play-again">
    <label for="playAgain"></label>
    <button id="playAgain" type="button" value="playAgain">Play Again!</button>
    <label for="reset-score"></label>
    <button id="reset-score" type="button" value="reset-score">Reset Score</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
